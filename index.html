<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubham Patel | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#050816;
overflow-x:hidden;
color:white;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 20%,#3b82f6 0%,transparent 25%),
radial-gradient(circle at 80% 25%,#9333ea 0%,transparent 30%),
radial-gradient(circle at 50% 90%,#06b6d4 0%,transparent 35%);
filter:blur(40px);
animation:bgmove 12s linear infinite alternate;
z-index:-2;
}

@keyframes bgmove{
0%{transform:scale(1);}
100%{transform:scale(1.25);}
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
}

.logo{
font-size:28px;
font-weight:700;
color:#00e5ff;
}

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px 8%;
gap:50px;
}

.left{
flex:1;
}

.right{
flex:1;
display:flex;
justify-content:center;
}

.profile{
width:320px;
height:320px;
border-radius:50%;
object-fit:cover;
border:6px solid #00e5ff;
box-shadow:
0 0 25px #00e5ff,
0 0 60px #00e5ff;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-15px);
}
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:40px;
}

h1{
font-size:65px;
line-height:1.1;
margin-bottom:15px;
}

h1 span{
color:#00e5ff;
}

.subtitle{
font-size:20px;
opacity:.85;
margin-bottom:35px;
}

.buttons{
display:flex;
flex-direction:column;
gap:18px;
}

.btn{
text-decoration:none;
padding:18px 22px;
border-radius:18px;
font-size:18px;
font-weight:600;
display:flex;
align-items:center;
gap:12px;
color:white;
transition:.35s;
}

.btn:hover{
transform:translateX(8px) scale(1.04);
}

.whatsapp{background:#25D366;}
.instagram{background:#E1306C;}
.youtube{background:#ff0000;}

@media(max-width:900px){

.hero{
flex-direction:column-reverse;
text-align:center;
}

.profile{
width:220px;
height:220px;
}

h1{
font-size:42px;
}

}

</style>
</head>

<body>

<div class="nav">
<div class="logo">Shubham Patel</div>
</div>

<section class="hero">

<div class="left">

<div class="glass">

<h1>Hello, I'm <span>Shubham Patel</span></h1>

<p class="subtitle">
Content Creator • Tech • YouTuber
</p>

<div class="buttons">

<a class="btn whatsapp"
href="https://wa.me/919359698643"
target="_blank">
<i class="fab fa-whatsapp"></i>
WhatsApp
</a>

<a class="btn instagram"
href="https://www.instagram.com/shubhampatelllllll?igsh=MXNtdHZmb3Fhdmg2cg=="
target="_blank">
<i class="fab fa-instagram"></i>
Instagram
</a>

<a class="btn youtube"
href="https://youtube.com/@shubham_ythu?si=NzAPpLI6quGmhMVB"
target="_blank">
<i class="fab fa-youtube"></i>
YouTube
</a></div>

</div>

<div class="right">

<img src="profile.jpg" class="profile">

</div>

</section>

<footer>

<p>© 2026 Shubham Patel • All Rights Reserved</p>

</footer>

<script>

const text="Shubham Patel";
let i=0;

const title=document.querySelector("h1 span");

title.innerHTML="";

function typing(){

if(i<text.length){

title.innerHTML+=text.charAt(i);

i++;

setTimeout(typing,120);

}

}

typing();

for(let i=0;i<80;i++){

let star=document.createElement("div");

star.style.position="fixed";

star.style.width="2px";

star.style.height="2px";

star.style.borderRadius="50%";

star.style.background="white";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

star.style.opacity=Math.random();

star.style.animation="twinkle "+(2+Math.random()*4)+"s infinite";

document.body.appendChild(star);

}

const style=document.createElement("style");

style.innerHTML=`

@keyframes twinkle{

0%{opacity:.2;transform:scale(.5);}

50%{opacity:1;transform:scale(1.5);}

100%{opacity:.2;transform:scale(.5);}

}

`;

document.head.appendChild(style);

document.addEventListener("mousemove",e=>{

let glow=document.createElement("div");

glow.style.position="fixed";

glow.style.left=e.clientX+"px";

glow.style.top=e.clientY+"px";

glow.style.width="10px";

glow.style.height="10px";

glow.style.borderRadius="50%";

glow.style.background="#00e5ff";

glow.style.boxShadow="0 0 20px #00e5ff";

glow.style.pointerEvents="none";

document.body.appendChild(glow);

setTimeout(()=>{

glow.remove();

},400);

});

</script>

</body>

</html>
