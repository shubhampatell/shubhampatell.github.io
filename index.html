<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$HUBHAM PATEL | Personal Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0f172a; 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Profile Image */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(#0f172a, #0f172a) padding-box, 
                        linear-gradient(45deg, #00f2fe, #4facfe) border-box;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Premium Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Hover Effect */
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Specific Button Colors */
        .youtube {
            background: linear-gradient(45deg, #ff0000, #cc0000);
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }

        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2);
        }

        .whatsapp {
            background: linear-gradient(45deg, #25D366, #128C7E);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        .link-btn i {
            font-size: 22px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="2462.png" alt="$HUBHAM PATEL" class="profile-img">
        
        <h1 class="name">$HUBHAM PATEL</h1>
        <p class="bio">AI Artist | Video Creator</p>

        <div class="links-container">
            <a href="https://youtube.com/@shubham_ythu?si=NzAPpLI6quGmhMVB" target="_blank" class="link-btn youtube">
                <i class="fa-brands fa-youtube"></i> Subscribe on YouTube
            </a>

            <a href="https://www.instagram.com/shubhampatelllllll?igsh=MXNtdHZmb3Fhdmg2cg==" target="_blank" class="link-btn instagram">
                <i class="fa-brands fa-instagram"></i> Follow on Instagram
            </a>

            <a href="https://wa.me/919359698643" target="_blank" class="link-btn whatsapp">
                <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
